name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Swift tooling
        run: brew install swiftlint swift-format

      - name: Lint with swift-format
        run: swift-format lint -r EyeBreak EyeBreakTests

      - name: Lint with SwiftLint
        run: swiftlint lint

      - name: Build app
        run: xcodebuild -project EyeBreak.xcodeproj -scheme EyeBreak -destination 'platform=macOS' build

      - name: Run tests
        run: xcodebuild test -project EyeBreak.xcodeproj -scheme EyeBreak -destination 'platform=macOS'
