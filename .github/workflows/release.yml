name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Release app
        run: xcodebuild -project EyeBreak.xcodeproj -scheme EyeBreak -configuration Release -destination 'platform=macOS' build

      - name: Package app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path '*Build/Products/Release/EyeBreak.app' -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "Release app not found in DerivedData"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" EyeBreak-macOS.zip

          STAGING_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING_DIR/"
          hdiutil create \
            -volname "EyeBreak" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            EyeBreak-macOS.dmg
          rm -rf "$STAGING_DIR"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: EyeBreak-macOS
          path: |
            EyeBreak-macOS.zip
            EyeBreak-macOS.dmg

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          body: |
            Unsigned macOS prerelease build.

            These artifacts are not notarized and may be blocked by Gatekeeper on a default macOS system.
          files: |
            EyeBreak-macOS.zip
            EyeBreak-macOS.dmg
