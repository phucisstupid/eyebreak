name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build Release app
        run: xcodebuild -project EyeBreak.xcodeproj -scheme EyeBreak -configuration Release -destination 'platform=macOS' build

      - name: Package zip
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path '*Build/Products/Release/EyeBreak.app' -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "Release app not found in DerivedData"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" EyeBreak-macOS.zip

      - name: Install DMG builder
        run: npm install --global create-dmg

      - name: Package dmg
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path '*Build/Products/Release/EyeBreak.app' -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "Release app not found in DerivedData"
            exit 1
          fi

          rm -f EyeBreak.dmg EyeBreak-macOS.dmg
          create-dmg "$APP_PATH" . \
            --overwrite \
            --no-version-in-filename \
            --no-code-sign \
            --dmg-title=EyeBreak
          mv EyeBreak.dmg EyeBreak-macOS.dmg

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: EyeBreak-macOS
          path: |
            EyeBreak-macOS.zip
            EyeBreak-macOS.dmg

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          body: |
            Unsigned macOS prerelease build.

            These artifacts are not notarized and may be blocked by Gatekeeper on a default macOS system.
          files: |
            EyeBreak-macOS.zip
            EyeBreak-macOS.dmg
